<!DOCTYPE html>
<html>
<head>

<title>Register - Handwriting Analysis</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
    min-height:100vh;
}

/* Navbar */
.navbar{
    background:linear-gradient(90deg,#6a11cb,#2575fc);
}

.navbar-brand{
    color:white !important;
    font-weight:600;
}

/* Register Styles */

.register-container{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:50px;
}

.register-card{
    border:none;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    overflow:hidden;
}

.register-left{
    background:linear-gradient(135deg,#11998e,#38ef7d);
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.register-right{
    padding:40px;
}

.input-group-text{
    background:#f1f3f6;
}

.register-btn{
    width:100%;
    padding:12px;
    border-radius:30px;
}

.password-toggle{
    cursor:pointer;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand" href="index.html">
<i class="fa-solid fa-pen-nib"></i> Handwriting OCR
</a>
</div>
</nav>


<div class="container register-container">

<div class="row register-card col-lg-10">

<!-- LEFT -->
<div class="col-md-6 register-left text-center">
<h3>Create Account ✨</h3>

<p class="mt-3">
Join the AI-powered handwritten text analysis system and evaluate answers automatically.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135789.png"
     style="width:200px;margin-top:20px">
</div>


<!-- RIGHT -->
<div class="col-md-6 register-right">

<h3 class="mb-4 text-center">📝 Register</h3>

<form onsubmit="registerUser(event)">

<div class="mb-3">
<label class="form-label">Username</label>
<div class="input-group">
<span class="input-group-text"><i class="fa fa-user"></i></span>
<input type="text" id="username" class="form-control" required>
</div>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<div class="input-group">
<span class="input-group-text"><i class="fa fa-lock"></i></span>
<input type="password" id="password" class="form-control" required>
<span class="input-group-text password-toggle" onclick="togglePassword()">
<i class="fa fa-eye"></i>
</span>
</div>
</div>

<button type="submit" class="btn btn-success register-btn">
Create Account
</button>

<div class="text-center mt-3">
<p>Already have an account?
<a href="login.html">Login</a>
</p>
</div>

</form>

</div>

</div>

</div>


<script>

function togglePassword(){
let x = document.getElementById("password");
x.type = (x.type === "password") ? "text" : "password";
}

// REGISTER FUNCTION
function registerUser(event){
event.preventDefault();

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

// store in localStorage
let userData = {
    username: username,
    password: password
};

localStorage.setItem("user", JSON.stringify(userData));

alert("Registration Successful! Please login.");
window.location.href = "login.html";
}

</script>

</body>
</html>
